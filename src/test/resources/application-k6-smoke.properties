spring.datasource.url=jdbc:h2:mem:week11_eval_artifact_link;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.flyway.enabled=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:k6-smoke/schema.sql
spring.sql.init.data-locations=classpath:k6-smoke/data.sql

management.health.db.enabled=false
management.health.redis.enabled=false
management.health.diskspace.enabled=false
management.endpoint.health.show-details=always

spring.security.user.name=k6-user
spring.security.user.password=k6-password
spring.security.user.roles=USER
